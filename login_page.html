<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F7F6F3;
      --card: #FFFFFF;
      --accent: #1B4D3E;
      --accent-hover: #163F33;
      --text: #1A1A1A;
      --muted: #6B6B6B;
      --border: #D4D2CD;
      --input-bg: #FAFAF9;
      --error: #B5403F;
      --success: #1B4D3E;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg) 0%, #EDE9E1 100%);
      padding: 20px;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    }

    .logo-mark {
      font-size: 32px;
      color: var(--accent);
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 28px;
    }

    .field-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    input {
      font-family: inherit;
      font-size: 15px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input::placeholder {
      color: #B0AEA8;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(27, 77, 62, 0.09);
    }

    input.input-error {
      border-color: var(--error);
    }

    .error-text {
      font-size: 12px;
      color: var(--error);
      font-weight: 500;
      display: none;
    }

    .error-text.visible {
      display: block;
    }

    .btn {
      width: 100%;
      padding: 13px 0;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: #FFFFFF;
      background-color: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s;
      letter-spacing: 0.01em;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .footer {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }

    .footer a {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Success state */
    .success-view {
      display: none;
      text-align: center;
    }

    .success-view.active {
      display: block;
    }

    .login-view.hidden {
      display: none;
    }

    .success-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(27, 77, 62, 0.08);
      color: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      margin: 0 auto 20px;
    }

    .success-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .success-msg {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Login Form -->
    <div class="login-view" id="loginView">
      <div class="logo-mark">⬡</div>
      <h2 class="title">Customer Login</h2>
      <p class="subtitle">Enter your details to continue</p>

      <div class="field-group">
        <div class="field-wrapper">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Arjun Mehta" autocomplete="name" />
          <span class="error-text" id="nameError">Name is required</span>
        </div>

        <div class="field-wrapper">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel" />
          <span class="error-text" id="phoneError">Phone number is required</span>
        </div>

        <div class="field-wrapper">
          <label for="email">Mail ID</label>
          <input type="email" id="email" placeholder="arjun@company.com" autocomplete="email" />
          <span class="error-text" id="emailError">Mail ID is required</span>
        </div>
      </div>

      <button class="btn" id="signInBtn">Sign in</button>

      <p class="footer">
        By signing in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
      </p>
    </div>

    <!-- Success View -->
    <div class="success-view" id="successView">
      <div class="success-icon">✓</div>
      <h2 class="success-name" id="welcomeName">Welcome</h2>
      <p class="success-msg">You're signed in successfully.</p>
      <button class="btn" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <script>
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');
    const emailInput = document.getElementById('email');
    const nameError = document.getElementById('nameError');
    const phoneError = document.getElementById('phoneError');
    const emailError = document.getElementById('emailError');
    const signInBtn = document.getElementById('signInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const loginView = document.getElementById('loginView');
    const successView = document.getElementById('successView');
    const welcomeName = document.getElementById('welcomeName');

    function clearError(input, errorEl) {
      input.addEventListener('input', () => {
        input.classList.remove('input-error');
        errorEl.classList.remove('visible');
      });
    }

    clearError(nameInput, nameError);
    clearError(phoneInput, phoneError);
    clearError(emailInput, emailError);

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validatePhone(phone) {
      return /^[\d\s\-+()]{7,15}$/.test(phone);
    }

    function showError(input, errorEl, message) {
      input.classList.add('input-error');
      errorEl.textContent = message;
      errorEl.classList.add('visible');
    }

    signInBtn.addEventListener('click', () => {
      let valid = true;

      if (!nameInput.value.trim()) {
        showError(nameInput, nameError, 'Name is required');
        valid = false;
      }

      if (!phoneInput.value.trim()) {
        showError(phoneInput, phoneError, 'Phone number is required');
        valid = false;
      } else if (!validatePhone(phoneInput.value)) {
        showError(phoneInput, phoneError, 'Enter a valid phone number');
        valid = false;
      }

      if (!emailInput.value.trim()) {
        showError(emailInput, emailError, 'Mail ID is required');
        valid = false;
      } else if (!validateEmail(emailInput.value)) {
        showError(emailInput, emailError, 'Enter a valid email address');
        valid = false;
      }

      if (valid) {
        const firstName = nameInput.value.trim().split(' ')[0];
        welcomeName.textContent = 'Welcome, ' + firstName;
        loginView.classList.add('hidden');
        successView.classList.add('active');
      }
    });

    signOutBtn.addEventListener('click', () => {
      nameInput.value = '';
      phoneInput.value = '';
      emailInput.value = '';
      successView.classList.remove('active');
      loginView.classList.remove('hidden');
    });
  </script>

</body>
</html>
